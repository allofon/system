<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Facetterat klassifikationssystem</title>
<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f7f4f0;
  color: #333;
  margin: 0;
  padding: 0;
}

.tabs {
  display: flex;
  justify-content: center;
  background-color: #e0dfdc;
  border-bottom: 2px solid #cccccc;
}
.tabs button {
  padding: 12px 25px;
  border: none;
  background-color: transparent;
  cursor: pointer;
  font-weight: bold;
  color: #333;
  transition: background-color 0.2s;
}
.tabs button.active {
  border-bottom: 4px solid #4a90e2;
  color: #4a90e2;
}
.tabs button:hover {
  background-color: #dddddd;
}

.tab-content {
  display: none;
  padding: 20px;
}

.facet-container {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-bottom: 20px;
}
.facet {
  border: 2px solid #888;
  border-radius: 8px;
  padding: 10px;
  width: 180px;
  height: 320px;
  text-align: center;
  background-color: #d9e8fc;
  box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
  overflow-y: auto;
}
.facet h3 {
  margin-top: 0;
  font-size: 1.2em;
}
.facet div {
  margin: 5px 0;
  cursor: pointer;
  padding: 3px 5px;
  border-radius: 3px;
  border: 2px solid transparent;
  box-sizing: border-box;
  transition: background-color 0.2s, border 0.2s;
}
.facet div.selected {
  background-color: #4a90e2;
  color: white;
}
.facet-code {
  font-weight: bold;
}

.database-index-container {
  display: flex;
  gap: 30px;
  justify-content: center;
  margin-top: 20px;
}
#database-container {
  width: 600px;
  height: 620px;

  padding: 10px;

  box-shadow: 1px 1px 5px rgba(0,0,0,0.1);

}
#index-container {
  width: 400px;
  height: 620px;
  background-color: #fffbe6;
  padding: 10px;
  border-radius: 8px;
  box-shadow: 1px 1px 5px rgba(0,0,0,0.1);

}
#database-table {
  width: 100%;

}
#database-table th {
  background-color: #cfe2f3;
  padding: 8px;
}
#database-table td {
  padding: 6px 10px;
  border: 1px solid #ccc;
}
#database-table tr:hover {
  background-color: #f0f0f0;
}

#index-search {
  width: 70%;
  padding: 5px;
  margin-bottom: 8px;
  border: 1px solid #ccc;
  border-radius: 4px;
}
#index div {
  display: flex;
  justify-content: space-between;
  padding: 2px 4px;
  cursor: pointer;
  border-radius: 3px;
}
#index div:hover {
  background-color: #ffe5b3;
}
#index div.selected {
  background-color: #f5a623;
  color: white;
}
#index div span.name { flex-shrink: 0; }
#index div span.dots { flex-grow: 1; border-bottom: 1px dotted #888; margin: 0 5px; }
#index div span.code { flex-shrink: 0; font-weight: bold; }

#index-tabs button {
  padding: 4px 10px;
  font-size: 0.95em;
  cursor: pointer;
  border: 1px solid #ccc;
  background: #f0f0f0;
  border-radius: 4px;

}
#index-tabs button.active {
  background: #4a90e2;

}
#index-tabs button:hover:not(.active) {
  background: #d0d0d0;
}

#klass {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 20px;
}
#klass h2 {
  margin-bottom: 25px;
}
#klass input {
  padding: 10px 14px;
  font-size: 1.1em;
  border: 2px solid #4a90e2;
  border-radius: 5px;

  text-align: center;

}
#klass #add-button {

}

  color: #1a3e72;

}
#combined-code {

#facet-A {

#index-content div:hover {

#index-content::-webkit-scrollbar {

}

  box-shadow: inset 0 0 4px rgba(0,0,0,0.05);
}

#index-content div:hover {
  background-color: #cce4f7;
}

}

#index-content div {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 2px 4px;
  cursor: pointer;
  border-radius: 3px;
}

#index-content div span.name {
  flex-shrink: 0;

}

#index-content div span.dots {
  flex-grow: 1;

}

  flex-shrink: 0;

}

#database-container h2,
#index-container h2 {
  text-align: center;

}

#index-search {
  display: block;          
  margin: 0 auto 12px auto; 
  width: 80%;              
  text-align: center; 
}

.tabs {
  display: flex;
  justify-content: center;
  gap: 14px;
  padding: 14px 0;

}

.tabs button {
  padding: 14px 30px;
  border: none;

  font-weight: 600;

}

}

.tabs button:hover:not(.active) {
  background: linear-gradient(145deg, #d5d5d5, #f0f0f0);

}

}

</style>
</head>
<body>

<div class="tabs">
<div class="tab-logo">NiLK</div>
  <button class="tablink active" onclick="openTab(event,'klass')">Klassifikation</button>
  <button class="tablink" onclick="openTab(event,'data')">Databas & index</button>
</div>

<div id="klass" class="tab-content" style="display:block;">
  <div class="klass-wrapper" style="display:flex; flex-direction:column; align-items:center;">
    <h2>Nobelpristagare i litteratur-klassifikation</h2>
    <div class="facet-container">
      <div class="facet" id="facet-A"><h3>Prisår</h3></div>
      <div class="facet" id="facet-B"><h3>Nationalitet</h3></div>
      <div class="facet" id="facet-C"><h3>Kön</h3></div>
      <div class="facet" id="facet-D"><h3>Genre</h3></div>
    </div>
    <div id="selected-combination">Ingen facett vald</div>
    <div id="combined-code"></div>
    <input id="object-name" type="text" placeholder="Namn på person">
    <button id="add-button" onclick="addToDatabase()">Lägg till</button>
  </div>
</div>

<div id="data" class="tab-content">
  <div class="database-index-container">
    <div id="database-container">
      <h2>Databas</h2>
      <table id="database-table">
        <thead>
          <tr>
            <th>Kod</th>
            <th>Person</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="database-table-body"></tbody>
      </table>
    </div>
    <div id="index-container">
      <h2>Index</h2>
      <input type="text" id="index-search" placeholder="Sök i index...">
      <div id="index-tabs" style="display:flex; gap:5px; margin-bottom:10px;">
  <button class="index-tab active" data-facet="A">Prisår</button>
  <button class="index-tab" data-facet="B">Länder</button>
  <button class="index-tab" data-facet="C">Kön</button>
  <button class="index-tab" data-facet="D">Genre</button>
</div>
<div id="index-content"></div>
    </div>
  </div>
</div>

</div>

<script>

function openTab(evt, tabName) {
  document.querySelectorAll('.tab-content').forEach(tc => tc.style.display = 'none');
  document.querySelectorAll('.tablink').forEach(tb => tb.classList.remove('active'));
  document.getElementById(tabName).style.display = 'block';
  evt.currentTarget.classList.add('active');
}


let database = JSON.parse(localStorage.getItem("database")) || [];
const facets = {
  A:[
{name:'1900-1909',code:'1900'},{name:'1910-1919',code:'1910'},{name:'1920-1929',code:'1920'},
{name:'1930-1931',code:'1930'},{name:'1940-1949',code:'1940'},{name:'1950-1951',code:'1950'},
{name:'1960-1969',code:'1960'},{name:'1970-1979',code:'1970'},{name:'1980-1989',code:'1980'},
{name:'1990-1999',code:'1990'},{name:'2000-2009',code:'2000'},{name:'2010-2019',code:'2010'},
{name:'2020-2029',code:'2020'}
],
  B:  [
  {name:'Argentina', code:'AR'},       
  {name:'Australien', code:'AU'},       
  {name:'Belgien', code:'BE'},
  {name:'Chile', code:'CL'},
  {name:'Colombia', code:'CO'},
  {name:'Danmark', code:'DK'},
  {name:'Egypten', code:'EG'},
  {name:'Finland', code:'FI'},
  {name:'Frankrike', code:'FR'},
  {name:'Grekland', code:'GR'},
  {name:'Guatemala', code:'GT'},
  {name:'Irland', code:'IE'},
  {name:'Island', code:'IS'},
  {name:'Israel', code:'IL'},
  {name:'Italien', code:'IT'},
  {name:'Japan', code:'JP'},
  {name:'Kanada', code:'CA'},           
  {name:'Kina', code:'CN'},
  {name:'Mexiko', code:'MX'},
  {name:'Nederländerna', code:'NL'},    
  {name:'Nigeria', code:'NG'},
  {name:'Norge', code:'NO'},
  {name:'Nya Zeeland', code:'NZ'},      
  {name:'Peru', code:'PE'},
  {name:'Polen', code:'PL'},
  {name:'Portugal', code:'PT'},
  {name:'Ryssland', code:'RU'},
  {name:'Saint Lucia', code:'LC'},
  {name:'Schweiz', code:'CH'},
  {name:'Sovjetunionen', code:'SU'},
  {name:'Spanien', code:'ES'},
  {name:'Storbritannien', code:'GB'},
  {name:'Sverige', code:'SE'},
  {name:'Sydafrika', code:'ZA'},
  {name:'Tanzania', code:'TZ'},
  {name:'Tjeckien', code:'CZ'},
  {name:'Trinidad och Tobago', code:'TT'},
  {name:'Turkiet', code:'TR'},
  {name:'Tyskland', code:'DE'},
  {name:'Ungern', code:'HU'},
  {name:'USA', code:'US'},
  {name:'Vitryssland', code:'BY'},
  {name:'Österrike', code:'AT'}
],
  C:[{name:'Icke-binär',code:'3'},{name:'Kvinna',code:'2'},{name:'Man',code:'1'}],
  D:[{name:'Barn & ungdom',code:'B'},{name:'Dramatik',code:'D'},{name:'Fantasy',code:'Fa'},{name:'Feelgood',code:'Fe'},{name:'Kriminallitteratur',code:'K'},{name:'Lyrik',code:'L'},{name:'Prosa',code:'P'},{name:'Science fiction',code:'Sc'},{name:'Skräck',code:'Sk'},{name:'Tecknade serie',code:'T'}]
};

const selected={A:null,B:[],C:null,D:[]};
let activeFilter = null;

function addToDatabase(){
  const name = document.getElementById("object-name").value.trim();
  if(!name){alert("Skriv ett namn på personen"); return;}
  database.push({name,A:selected.A||"",B:[...selected.B],C:selected.C||"",D:[...selected.D]});
  localStorage.setItem("database", JSON.stringify(database));
  document.getElementById("object-name").value="";
  buildDatabaseTable();
  buildIndex();
  updateSelection();
}

function buildDatabaseTable(data = database) {
  const tbody = document.getElementById("database-table-body");
  tbody.innerHTML = "";

  let filteredData = data;
  if(activeFilter){
    filteredData = data.filter(entry => {
      const fk = activeFilter.facet;
      const code = activeFilter.code;
      if(fk === "C") return entry[fk] === code;
      return entry[fk].includes(code);
    });
  }

  filteredData.forEach((entry,index)=>{
    const combinedCode = [
      entry.A,
      entry.B.join("-"),
      entry.C,
      entry.D.join("-")
    ].filter(Boolean).join(":");

    const row = document.createElement("tr");
    row.innerHTML = `
      <td class="facet-code-cell">${combinedCode}</td>
      <td>${entry.name}</td>
      <td><button onclick="deleteEntry(${index})">✖</button></td>
    `;
    tbody.appendChild(row);
  });

  buildIndex();
}

function deleteEntry(index){
  database.splice(index,1);
  localStorage.setItem("database", JSON.stringify(database));
  buildDatabaseTable();
  buildIndex();
  updateSelection();
}


function buildFacets() {
  Object.keys(facets).forEach(fk => {
    const container = document.getElementById("facet-" + fk);
    
    const header = container.querySelector("h3");
    
    container.innerHTML = "";
    
    if(header) container.appendChild(header);

    facets[fk].forEach(opt => {
      const div = document.createElement("div");
      div.innerHTML = `<span class="facet-code">${opt.code}</span> (${opt.name})`;

      div.addEventListener("click", () => {
        if(fk === "A" || fk === "C") {
          container.querySelectorAll("div").forEach(d => d.classList.remove("selected"));
          selected[fk] = selected[fk] === opt.code ? null : opt.code;
          if(selected[fk]) div.classList.add("selected");
        } else {
          const i = selected[fk].indexOf(opt.code);
          if(i >= 0) {
            selected[fk].splice(i,1);
            div.classList.remove("selected");
          } else {
            selected[fk].push(opt.code);
            div.classList.add("selected");
          }
        }
        updateSelection();
      });

      container.appendChild(div);
    });
  });
}

function updateSelection(){
  const codeParts=[];
  if(selected.A) codeParts.push(selected.A);
  if(selected.B.length) codeParts.push(selected.B.join("-"));
  if(selected.C) codeParts.push(selected.C);
  if(selected.D.length) codeParts.push(selected.D.join("-"));
  document.getElementById("combined-code").textContent = codeParts.join(":");

  const textParts=[];
  if(selected.A) textParts.push(selected.A);
  if(selected.B.length) textParts.push(selected.B.map(code=>facets.B.find(f=>f.code===code)?.name).join(", "));
  if(selected.C) textParts.push(facets.C.find(f=>f.code===selected.C)?.name);
  if(selected.D.length) textParts.push(selected.D.map(code=>facets.D.find(f=>f.code===code)?.name).join(", "));
  document.getElementById("selected-combination").textContent = textParts.length ? textParts.join(" - ") : "Ingen facett vald";
}

let currentFacet = "A";

document.querySelectorAll("#index-tabs .index-tab").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll("#index-tabs .index-tab").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentFacet = btn.dataset.facet;
    buildIndex();
  });
});

function buildIndex(){
  const indexDiv = document.getElementById("index-content");
  indexDiv.innerHTML = "";

  facets[currentFacet].forEach(opt=>{
    let count = 0;
    database.forEach(entry=>{
      if(currentFacet === "A" || currentFacet === "C"){
        if(entry[currentFacet] === opt.code) count++;
      } else {
        if(entry[currentFacet].includes(opt.code)) count++;
      }
    });

    const div = document.createElement("div");
    div.classList.toggle("selected", activeFilter?.facet===currentFacet && activeFilter?.code===opt.code);
    div.innerHTML = `<span class="name">${opt.name}</span><span class="dots"></span><span class="code">${count}</span>`;

    div.addEventListener("click",()=>{
      if(activeFilter && activeFilter.facet===currentFacet && activeFilter.code===opt.code){
        activeFilter = null;
      } else {
        activeFilter = {facet:currentFacet, code:opt.code};
      }
      buildDatabaseTable();
      buildIndex();
    });

    indexDiv.appendChild(div);
  });
}

function searchIndex(){
  const input = document.getElementById("index-search").value.toLowerCase();

  document.querySelectorAll("#index div").forEach(div=>{
    if(div.textContent.toLowerCase().includes(input)) div.style.display="flex";
    else div.style.display="none";
  });

  const filteredDatabase = database.filter(entry=>{
    const allCodes = [entry.A,...entry.B,entry.C,...entry.D].join(" ").toLowerCase();
    const allNames = entry.name.toLowerCase();
    return allCodes.includes(input) || allNames.includes(input);
  });

  buildDatabaseTable(filteredDatabase);
}

document.getElementById("index-search").addEventListener("input", searchIndex);

buildFacets();
updateSelection();
buildDatabaseTable();
buildIndex();
</script>
</body>
</html>
