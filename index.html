<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Facetterat klassifikationssystem</title>
<style>
/* ===== Kropp & centrering ===== */
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  background-color: #e5ecef;
}

/* ===== Facetter ===== */
.facet-container {
  display: flex;
  gap: 40px;
  justify-content: center;
  margin-bottom: 20px;
}

.facet {
  border: 2px solid #888;   /* Tjockare och tydligare ram */
  border-radius: 8px;       /* Rundade hörn */
  padding: 10px;
  width: 180px;
  text-align: center;
  background-color: #f9f9f9;
  box-shadow: 2px 2px 5px rgba(0,0,0,0.1); /* mjuk skugga för djup */
}

.facet h3 {
  margin-top: 0;
  cursor: default;
  font-size: 1.2em;
}

/* Facet-optioner */
.facet div {
  margin: 5px 0;
  cursor: pointer;
  padding: 3px 5px;
  border-radius: 3px;
  transition: background-color 0.2s, border 0.2s;
  border: 2px solid transparent;
  box-sizing: border-box;
}

/* Hover på icke-vald */
.facet div:not(.selected):hover {
  background-color: #efce88;
}

/* Markerad (valt) */
.facet div.selected {
  color: black;
}

/* Hover på markerad */
.facet div.selected:hover {
  border: 2px solid #000;
  box-sizing: border-box;
}

/* Facett-specifik bakgrund för valda */
#facet-A div.selected { background-color: #71af73; }
#facet-B div.selected { background-color: #eab4bf; }
#facet-C div.selected { background-color: #aeadce; }
#facet-D div.selected { background-color: #b8c251; }
#facet-E div.selected { background-color: #e6bbea; }

/* Färgade siffror */
.facet-code {
  font-weight: bold;
  font-size: 1.2em;
  margin-right: 4px;
}


/* Svag bakgrund per facett */
#facet-A { background-color: #e6f4ea; }
#facet-B { background-color: #fce8e6; }
#facet-C { background-color: #e8f0fe; }
#facet-D { background-color: #eef1e6; }
#facet-E { background-color: #f8e6fb; }

/* ===== Vald kombination ===== */
#selected-combination {
  margin-top: 20px;
  font-weight: bold;
  font-size: 1.5em;
  color: #333;
  letter-spacing: 0.05em;
}

/* ===== Färgad kod/siffror ===== */
#combined-code {
  margin-top: 5px;
  font-family: mono	space;
  font-weight: bold;
  font-size: 2.2em;
}
#combined-code span { margin-right: 0.2em; }

/* ===== Index ===== */
#index-search {
  margin-top: 15px;
  margin-bottom:10px;
  padding:5px;
  width:200px;
}
#index {
  margin-top: 10px;
  column-count: 3;
  max-width: 500px;
  text-align: center;
}
#index div {
  cursor: pointer;
  padding: 3px;
}
#index div:hover { background: #f0f0f0; }

/* ===== Databas-tabell ===== */
#database-container {
  margin-bottom: 30px;
  width: 90%;
  max-width: 900px;
  font-size: 1.0em;           /* större text */
}
#database-table {
  width: 100%;
  border-collapse: collapse;
  text-align: center;
  font-size: 1.0em;           /* större text */
}
#database-table th, #database-table td {
  border: 1px solid #ccc;
  padding: 6px 10px;           /* mer padding */
}
#database-table th {
  background-color: #f0f0f0;
}
#database-table td span.facet-code {
  font-weight: bold;
  margin-left: 4px;
  font-size: 1.0em;            /* större siffror */
}

#add-button {
  margin-top: 6px;
}

#object-name {
  padding: 8px 12px;          /* större inmatningsfält */
  font-size: 1.0em;           /* större text */
  border: 2px solid #888;     /* tydligare kant */
  border-radius: 5px;
  margin-right: 7px;          /* lite mellanrum till knappen */
}

#add-button {
  padding: 6px 13px;          /* större knapp */
  font-size: 1.0em;           /* större text */
  border: 2px solid #888;     /* tydligare kant */
  border-radius: 5px;
  background-color: #f0f0f0;  /* neutral bakgrund */
  cursor: pointer;
  transition: background-color 0.2s, transform 0.1s;
  margin-top: 6px;            /* flyttar ner lite */
}

#add-button:hover {
  background-color: #e0e0e0;  /* hover-effekt */
  transform: translateY(-1px); /* subtil animation */
}
</style>
</head>
<body>

<!-- ===== Databas ===== -->
<div id="database-container">
  <h2>Databas</h2>
  <table id="database-table">
<thead>
<tr>
<th>Kod</th>
<th>Objekt</th>
<th></th>
</tr>
</thead>
    <tbody id="database-table-body">
      <!-- Rader fylls via JS -->
    </tbody>
  </table>
</div>

<h2>Facetterat klassifikationssystem</h2>

<div class="facet-container">
  <div class="facet" id="facet-A"><h3>Vinstår</h3></div>
  <div class="facet" id="facet-B"><h3>Nationalitet</h3></div>
  <div class="facet" id="facet-C"><h3>Kön</h3></div>
  <div class="facet" id="facet-D"><h3>Genre</h3></div>
</div>

<div id="selected-combination">Ingen facett vald</div>
<div id="combined-code"></div>

<h3>Lägg till i databas</h3>

<input id="object-name" type="text" placeholder="Namn på objekt">

<button id="add-button" onclick="addToDatabase()">Lägg till</button>

<h3>Index</h3>
<input type="text" id="index-search" placeholder="Sök term...">
<div id="index"></div>

<script>
let database = JSON.parse(localStorage.getItem("database")) || [];

const facets = {
  A: [ { name: '1901', code: '1901' }, { name: '1902', code: '1902' }, { name: '1903', code: '1903' } ],
  B: [ { name: 'Sverige', code: 'SE' }, { name: 'Norge', code: 'NO' }, { name: 'Finland', code: 'FI' } ],
  C: [ { name: 'Icke-binär', code: 'IB' }, { name: 'Kvinna', code: 'K' }, { name: 'Man', code: 'M' } ],
  D: [ { name: 'Autofiktion', code: 'A' }, { name: 'Biografi', code: 'B' }, { name: 'Barnbok', code: 'Bb' }, { name: 'Dramatik', code: 'D' }, { name: 'Essä', code: 'E' }, { name: 'Facklitteratur', code: 'F' }, { name: 'Komedi', code: 'K' }, { name: 'Lyrik', code: 'L' }, { name: 'Musiktext', code: 'Mu' }, { name: 'Novell', code: 'N' }, { name: 'Roman', code: 'R' } ]
};

const selected = { A: null, B: [], C: null, D: [] };

function addToDatabase() {
  const name = document.getElementById("object-name").value.trim();
  if (!name) { alert("Skriv ett namn på objektet"); return; }

  const entry = {
    name,
    A: selected.A || "",
    B: [...selected.B],
    C: selected.C || "",
    D: [...selected.D]
  };

  database.push(entry);
  localStorage.setItem("database", JSON.stringify(database));
  buildDatabaseTable();
  document.getElementById("object-name").value = "";
}

function buildDatabaseTable() {
  const tbody = document.getElementById("database-table-body");
  tbody.innerHTML = "";

  database.forEach((entry, index) => {
    const codeA = entry.A || "";
    const codeB = entry.B.map(b => facets.B.find(f => f.name === b)?.code).join(".");
    const codeC = entry.C || "";
    const codeD = entry.D.map(d => facets.D.find(f => f.name === d)?.code).join(".");

    const row = document.createElement("tr");
    row.innerHTML = `
      <td>
        <span class="facet-code A">${codeA}</span>
        <span class="facet-code B">${codeB}</span>
        <span class="facet-code C">${codeC}</span>
        <span class="facet-code D">${codeD}</span>
      </td>
      <td>${entry.name}</td>
      <td><button onclick="deleteEntry(${index})">✖</button></td>
    `;
    tbody.appendChild(row);
  });
}

function deleteEntry(index) {
  database.splice(index,1);
  localStorage.setItem("database", JSON.stringify(database));
  buildDatabaseTable();
}

function buildFacets() {
  Object.keys(facets).forEach(fk => {
    const container = document.getElementById("facet-" + fk);
    facets[fk].forEach(opt => {
      const div = document.createElement("div");
      div.innerHTML = `<span class="facet-code ${fk}">${opt.code}</span> (${opt.name})`;
      div.addEventListener("click", () => {
        if (fk === "C" || fk === "A") {
          // single-select
          container.querySelectorAll("div").forEach(d => d.classList.remove("selected"));
          selected[fk] = selected[fk] === opt.name ? null : opt.name;
          if (selected[fk]) div.classList.add("selected");
        } else {
          // multi-select
          const i = selected[fk].indexOf(opt.name);
          if (i >= 0) { selected[fk].splice(i,1); div.classList.remove("selected"); }
          else { selected[fk].push(opt.name); div.classList.add("selected"); }
        }
        updateSelection();
      });
      container.appendChild(div);
    });
  });
}

function updateSelection() {
  const combinedCodeDiv = document.getElementById("combined-code");
  const codeParts = [];
  if(selected.A) codeParts.push(selected.A);
  if(selected.B.length) codeParts.push(selected.B.map(b => facets.B.find(f => f.name === b)?.code).join("."));
  if(selected.C) codeParts.push(selected.C);
  if(selected.D.length) codeParts.push(selected.D.map(d => facets.D.find(f => f.name === d)?.code).join("."));
  combinedCodeDiv.textContent = codeParts.join(":");

  const selectedStrings = [];
  if(selected.A) selectedStrings.push(selected.A);
  if(selected.B.length) selectedStrings.push(selected.B.join(", "));
  if(selected.C) selectedStrings.push(selected.C);
  if(selected.D.length) selectedStrings.push(selected.D.join(", "));
  document.getElementById("selected-combination").textContent = selectedStrings.length ? selectedStrings.join(" - ") : "Ingen facett vald";
}

// init
buildFacets();
updateSelection();
buildDatabaseTable();
</script>
  
</body>
</html>
